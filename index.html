<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>買菜金額換算</title>
    
    <!-- PWA 與 Icon 設定 -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- 外部資源：Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // --- 本機儲存邏輯 (取代 Firebase) ---
        
        // 核心狀態管理
        let selectedProduct = "鮭魚";
        let currentFilter = "全部";
        let allRecords = JSON.parse(localStorage.getItem('market_records')) || [];
        let dynamicCategories = JSON.parse(localStorage.getItem('market_categories')) || ["鮭魚"];

        // 儲存資料到本機的輔助函式
        function syncToLocalStorage() {
            localStorage.setItem('market_records', JSON.stringify(allRecords));
            localStorage.setItem('market_categories', JSON.stringify(dynamicCategories));
        }

        // --- 核心 UI 渲染函式 ---

        // 渲染產品按鈕區域 (固定四格邏輯)
        window.renderProductSelectionUI = function() {
            const container = document.getElementById('product-buttons-container');
            if (!container) return;
            container.innerHTML = '';
            
            // 第一格：固定產品 1
            if (dynamicCategories.length >= 1) {
                appendProductButton(container, dynamicCategories[0]);
            } else {
                appendEmptySlot(container);
            }

            // 第二格：固定產品 2
            if (dynamicCategories.length >= 2) {
                appendProductButton(container, dynamicCategories[1]);
            } else {
                appendEmptySlot(container);
            }

            // 第三格：邏輯格 (如果是 3 個則顯示按鈕，超過 3 個則顯示下拉選單)
            if (dynamicCategories.length === 3) {
                appendProductButton(container, dynamicCategories[2]);
            } else if (dynamicCategories.length > 3) {
                appendProductDropdown(container, dynamicCategories.slice(2));
            } else {
                appendEmptySlot(container);
            }

            // 第四格：固定「➕ 新增」按鈕
            const addBtn = document.createElement('button');
            addBtn.onclick = () => document.getElementById('custom_product_div').classList.toggle('hidden');
            addBtn.className = "py-3 px-1 text-lg font-bold rounded-xl border-2 border-dashed border-slate-300 bg-slate-50 text-slate-500 active:scale-95 transition-transform shadow-sm h-[60px]";
            addBtn.innerText = "➕ 新增";
            container.appendChild(addBtn);
        };

        function appendProductButton(container, name) {
            const isActive = selectedProduct === name;
            const btn = document.createElement('button');
            btn.onclick = () => window.selectProduct(name);
            btn.className = `product-btn py-3 px-1 text-lg font-bold rounded-xl border-2 transition-transform active:scale-95 shadow-sm h-[60px] truncate ${
                isActive ? 'border-teal-600 bg-teal-600 text-white' : 'border-teal-200 bg-white text-teal-700'
            }`;
            btn.innerText = name;
            container.appendChild(btn);
        }

        function appendProductDropdown(container, items) {
            const select = document.createElement('select');
            const isAnyActive = items.includes(selectedProduct);
            
            select.className = `py-3 px-1 text-lg font-bold rounded-xl border-2 shadow-sm h-[60px] outline-none appearance-none text-center leading-tight ${
                isAnyActive ? 'border-teal-600 bg-teal-600 text-white' : 'border-teal-200 bg-white text-teal-700'
            }`;
            
            const placeholder = document.createElement('option');
            placeholder.text = isAnyActive ? selectedProduct : "更多▼";
            placeholder.value = isAnyActive ? selectedProduct : "";
            placeholder.disabled = true;
            placeholder.selected = true;
            select.appendChild(placeholder);

            items.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item;
                opt.text = item;
                select.appendChild(opt);
            });

            select.onchange = (e) => {
                if (e.target.value) window.selectProduct(e.target.value);
            };

            container.appendChild(select);
        }

        function appendEmptySlot(container) {
            const div = document.createElement('div');
            div.className = "h-[60px] border-2 border-transparent";
            container.appendChild(div);
        }

        window.renderFilterUI = function() {
            const container = document.getElementById('filter-buttons-container');
            if (!container) return;
            container.innerHTML = '';

            const filters = ["全部", ...dynamicCategories];
            filters.forEach(f => {
                const isActive = currentFilter === f;
                const btn = document.createElement('button');
                btn.onclick = () => window.setFilter(f);
                btn.className = `filter-btn px-5 py-2 text-base font-bold rounded-full border-2 transition-all ${
                    isActive ? 'border-amber-400 bg-amber-400 text-amber-950 shadow-sm' : 'border-slate-200 bg-white text-slate-600'
                }`;
                btn.innerText = f;
                container.appendChild(btn);
            });
        };

        window.renderRecords = function() {
            const listContainer = document.getElementById('records-list');
            if (!listContainer) return;
            listContainer.innerHTML = '';
            
            const filteredDocs = currentFilter === "全部" 
                ? allRecords 
                : allRecords.filter(d => d.productName === currentFilter);

            if (filteredDocs.length === 0) {
                listContainer.innerHTML = `<div class="text-center p-12 text-slate-400 text-xl font-bold">目前沒有歷史紀錄</div>`;
                return;
            }

            // 按時間倒序排列
            const sortedRecords = [...filteredDocs].sort((a, b) => b.timestamp - a.timestamp);

            sortedRecords.forEach(data => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-sm border-l-4 border-amber-200 flex justify-between items-center mb-3";
                
                const totalText = data.totalPrice ? `<span class="text-slate-600 font-normal">，總共: </span><span class="text-emerald-700 font-black">$${data.totalPrice}</span><span class="text-slate-600 font-normal"> 元</span>` : '';
                const unitPriceLine = (data.priceKg || data.priceTj) ? `<div class="text-lg text-slate-600 mt-1 font-bold">單價：賣場: <span class="text-teal-700">$${data.priceKg || '--'}/kg</span> | 市場: <span class="text-amber-800">$${data.priceTj || '--'}/台斤</span></div>` : '';
                const footerInfo = data.remark ? `${data.remark} || ${data.displayTime || ''}` : `${data.displayTime || ''}`;
                
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="text-xl font-black text-slate-800 leading-tight">${data.productName}${totalText}</div>
                        ${unitPriceLine}
                        <div class="text-xs text-slate-400 mt-1 font-medium">${footerInfo}</div>
                    </div>
                    <button onclick="window.deleteRecord('${data.id}')" class="bg-rose-50 text-rose-400 p-3 rounded-xl active:bg-rose-100 ml-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewbox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                `;
                listContainer.appendChild(card);
            });
        };

        // --- 功能控制 ---

        window.showPage = function(pageId) {
            document.getElementById('page-converter').classList.add('hidden');
            document.getElementById('page-history').classList.add('hidden');
            document.getElementById('page-' + pageId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-slate-700', 'text-white', 'shadow-md');
                btn.classList.add('bg-slate-100', 'text-slate-500');
            });
            document.getElementById('nav-' + pageId).classList.add('bg-slate-700', 'text-white', 'shadow-md');
            
            window.scrollTo(0, 0);
            if (pageId === 'history') window.renderRecords();
        };

        window.selectProduct = function(name) {
            selectedProduct = name;
            window.renderProductSelectionUI();
            document.getElementById('custom_product_div').classList.add('hidden');
        };

        window.calcPrice = function(type) {
            const pkg = document.getElementById('price_kg');
            const ptj = document.getElementById('price_tj');
            if (!pkg || !ptj) return;
            if (type === 'kg') {
                const val = parseFloat(pkg.value);
                if (!isNaN(val)) ptj.value = Math.round(val * 0.6);
                else ptj.value = '';
            } else {
                const val = parseFloat(ptj.value);
                if (!isNaN(val)) pkg.value = Math.round(val / 0.6);
                else pkg.value = '';
            }
        };

        window.setFilter = function(filterName) {
            currentFilter = filterName;
            window.renderFilterUI();
            window.renderRecords();
        };

        // --- 資料操作 (LocalStorage 版) ---

        window.addNewProductAction = function() {
            const input = document.getElementById('custom_product_input');
            const newName = input.value.trim();
            if (!newName) return;
            if (!dynamicCategories.includes(newName)) {
                dynamicCategories.push(newName);
                syncToLocalStorage();
            }
            input.value = '';
            selectedProduct = newName;
            document.getElementById('custom_product_div').classList.add('hidden');
            window.renderProductSelectionUI();
            window.renderFilterUI();
            alertBox("已新增產品！");
        };

        window.saveCurrentRecord = function() {
            const pkg = document.getElementById('price_kg').value;
            const ptj = document.getElementById('price_tj').value;
            const remark = document.getElementById('price_remark').value;
            const total = document.getElementById('price_total').value;
            
            if (!pkg && !ptj && !total) { alertBox("請先輸入金額或單價"); return; }
            
            const now = new Date();
            const timeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            
            const newRecord = {
                id: Date.now().toString(),
                productName: selectedProduct,
                priceKg: pkg,
                priceTj: ptj,
                totalPrice: total,
                remark: remark,
                displayTime: timeStr,
                timestamp: Date.now()
            };
            
            allRecords.push(newRecord);
            syncToLocalStorage();
            
            // 清空輸入
            document.getElementById('price_kg').value = ''; 
            document.getElementById('price_tj').value = '';
            document.getElementById('price_remark').value = ''; 
            document.getElementById('price_total').value = '';
            alertBox("已存好囉！");
        };

        window.deleteRecord = function(id) {
            if (!window.confirm("確定要刪除這筆紀錄嗎？")) return;
            allRecords = allRecords.filter(r => r.id !== id);
            syncToLocalStorage();
            window.renderRecords();
        };

        function alertBox(msg) {
            const el = document.getElementById('toast');
            el.innerText = msg; el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 2000);
        }

        // --- 初始化啟動 ---
        document.addEventListener('DOMContentLoaded', () => {
            window.renderProductSelectionUI();
            window.renderFilterUI();
        });
    </script>
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, sans-serif; background-color: #f8fafc; padding-bottom: 240px; color: #1e293b; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .input-box { font-size: 3rem; height: 100px; text-align: center; border-width: 5px; font-weight: 800; width: 100%; border-radius: 1rem; -webkit-appearance: none; }
        .input-box-tall { height: 100%; min-height: 200px; }
        .unit-kg { color: #0284c7; font-weight: 900; }
        .unit-tj { color: #ea580c; font-weight: 900; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        select { -webkit-appearance: none; }
        .nav-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-2">
    <!-- 提示框 -->
    <div id="toast" class="fixed top-3 left-1/2 transform -translate-x-1/2 bg-slate-800/90 text-white px-6 py-3 rounded-full text-xl z-50 hidden shadow-2xl text-center">提示</div>

    <div class="max-w-2xl mx-auto space-y-3">
        <!-- 頁面一：金額換算 -->
        <div id="page-converter" class="space-y-3">
            <div class="bg-teal-700 py-2 px-4 rounded-xl text-white text-center shadow-sm">
                <h1 class="text-xl font-black">💰 金額換算</h1>
            </div>

            <!-- 產品選擇區：固定四格 -->
            <div class="bg-white p-3 rounded-2xl shadow-sm space-y-2">
                <div id="product-buttons-container" class="grid grid-cols-4 gap-2"></div>
                
                <!-- 新增產品輸入區 -->
                <div id="custom_product_div" class="hidden pt-3 border-t border-slate-100">
                    <div class="flex gap-2 items-center">
                        <input type="text" id="custom_product_input" class="flex-1 p-3 text-lg border-2 border-slate-200 rounded-xl focus:border-teal-400 outline-none bg-slate-50" placeholder="產品名稱">
                        <button onclick="addNewProductAction()" class="bg-teal-600 text-white w-20 py-3 rounded-xl font-bold text-lg shadow-sm active:scale-95 transition-transform">加入</button>
                    </div>
                </div>
            </div>

            <!-- 輸入與換算核心區 -->
            <div class="bg-white p-4 rounded-3xl shadow-sm border-t-4 border-teal-500">
                <div class="flex gap-3">
                    <!-- 左側：總共花多少錢 (等高垂直撐滿) -->
                    <div class="w-1/3 flex flex-col text-center">
                        <label class="text-lg font-black text-slate-800 mb-2 leading-tight">總共花多少錢</label>
                        <div class="relative flex-1 flex flex-col">
                            <input type="number" id="price_total" inputmode="decimal" class="input-box input-box-tall border-slate-200 bg-slate-50 focus:border-slate-800 outline-none" placeholder="0">
                            <span class="absolute right-2 bottom-4 text-base text-slate-400 font-bold">元</span>
                        </div>
                    </div>
                    
                    <div class="w-px bg-slate-200"></div>

                    <!-- 右側：單價價格 (加強顏色) -->
                    <div class="flex-1 space-y-4">
                        <div>
                            <label class="block text-xl font-black text-teal-800 mb-1">賣場 <span class="unit-kg">每公斤</span> 價格</label>
                            <div class="relative">
                                <input type="number" id="price_kg" inputmode="decimal" class="input-box border-sky-100 bg-sky-50 focus:border-sky-300 outline-none" placeholder="0" oninput="window.calcPrice('kg')">
                                <span class="absolute right-2 bottom-4 text-base text-sky-400 font-bold">元</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xl font-black text-amber-900 mb-1">市場 <span class="unit-tj">每台斤</span> 價格</label>
                            <div class="relative">
                                <input type="number" id="price_tj" inputmode="decimal" class="input-box border-amber-100 bg-amber-50 focus:border-amber-300 outline-none" placeholder="0" oninput="window.calcPrice('tj')">
                                <span class="absolute right-2 bottom-4 text-base text-sky-400 font-bold">元</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 備註與儲存 (同一行) -->
                <div class="mt-4 pt-4 border-t-2 border-dashed border-slate-100 flex gap-2 items-stretch h-[65px]">
                    <div class="flex-1">
                        <input type="text" id="price_remark" class="w-full p-4 rounded-xl border-2 border-slate-200 bg-slate-50 outline-none shadow-inner text-lg" placeholder="寫備註 (例如：全聯)">
                    </div>
                    <button onclick="window.saveCurrentRecord()" class="bg-orange-600 text-white px-6 py-4 rounded-xl text-2xl font-black shadow-lg active:scale-95 transition-transform flex items-center justify-center min-w-[120px]">
                        💾 儲存
                    </button>
                </div>
            </div>
            <div class="h-10"></div>
        </div>

        <!-- 頁面二：歷史紀錄 -->
        <div id="page-history" class="hidden space-y-3">
            <div class="bg-amber-600 py-2 px-4 rounded-xl text-white text-center shadow-sm">
                <h1 class="text-xl font-black">📋 歷史紀錄</h1>
            </div>
            <!-- 動態篩選區 -->
            <div id="filter-buttons-container" class="flex flex-wrap gap-2 px-1"></div>
            <!-- 紀錄清單 -->
            <div id="records-list" class="space-y-3 pb-8"></div>
            <div class="h-20"></div>
        </div>
    </div>

    <!-- 底部導覽列 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-sm border-t border-slate-100 p-3 flex gap-3 shadow-2xl z-40">
        <button id="nav-converter" onclick="showPage('converter')" class="nav-btn flex-1 py-5 rounded-xl text-xl font-black bg-slate-700 text-white shadow-md active:scale-95">⚖️ 金額換算</button>
        <button id="nav-history" onclick="showPage('history')" class="nav-btn flex-1 py-5 rounded-xl text-xl font-black bg-slate-100 text-slate-500 active:scale-95">🔎 歷史紀錄</button>
    </div>

    <!-- PWA 註冊邏輯 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW 註冊成功');
                }).catch(err => console.log('SW 註冊失敗', err));
            });
        }
    </script>
</body>
</html>
